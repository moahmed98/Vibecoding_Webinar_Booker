<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Codebasics Webinar Manager</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
    <div class="auth-center">
        <div style="margin-bottom: 32px;">
            <img src="https://files.codebasics.io/v3/images/sticky-logo.svg" alt="Codebasics" style="height: 72px;">
        </div>

        <div class="card card-glow" style="max-width: 440px; width: 100%; padding: 44px;">
            <!-- Tabs -->
            <div class="tabs" style="margin-bottom: 28px;">
                <button class="tab active" id="tab-login" onclick="showTab('login')">Login</button>
                <button class="tab" id="tab-register" onclick="showTab('register')">Register</button>
            </div>

            <!-- Login Form -->
            <form id="login-form" style="display: flex; flex-direction: column; gap: 16px;">
                <div>
                    <label class="cb-label">Email</label>
                    <input type="email" id="login-email" class="cb-input" placeholder="you@company.com" required>
                </div>
                <div>
                    <label class="cb-label">Password</label>
                    <input type="password" id="login-password" class="cb-input" placeholder="••••••••" required>
                </div>
                <div id="login-error" class="hidden"
                    style="color: var(--cb-danger); font-size: 13px; padding: 8px; background: #FEE2E2; border-radius: 6px;">
                </div>
                <button type="submit" class="btn-primary" id="login-btn">Sign In</button>
                <div style="text-align: right; margin-top: 4px;">
                    <a href="#" id="forgot-link" style="font-size: 13px; color: var(--cb-blue); font-weight: 500;">Forgot password?</a>
                </div>
            </form>

            <!-- Forgot Password Form -->
            <form id="forgot-form" class="hidden" style="display: flex; flex-direction: column; gap: 16px;">
                <p style="font-size: 14px; color: var(--cb-text-secondary); margin-bottom: 4px;">
                    Enter your email and we'll send you a link to reset your password.
                </p>
                <div>
                    <label class="cb-label">Email</label>
                    <input type="email" id="forgot-email" class="cb-input" placeholder="you@company.com" required>
                </div>
                <div id="forgot-error" class="hidden"
                    style="color: var(--cb-danger); font-size: 13px; padding: 8px; background: #FEE2E2; border-radius: 6px;">
                </div>
                <div id="forgot-success" class="hidden"
                    style="color: #059669; font-size: 13px; padding: 8px; background: #D1FAE5; border-radius: 6px;">
                </div>
                <button type="submit" class="btn-primary" id="forgot-btn">Send Reset Link</button>
                <div style="text-align: center; margin-top: 4px;">
                    <a href="#" id="back-to-login" style="font-size: 13px; color: var(--cb-blue); font-weight: 500;">← Back to login</a>
                </div>
            </form>

            <!-- Register Form -->
            <form id="register-form" class="hidden" style="display: flex; flex-direction: column; gap: 16px;">
                <div>
                    <label class="cb-label">Full Name</label>
                    <input type="text" id="reg-name" class="cb-input" placeholder="Your full name" required>
                </div>
                <div>
                    <label class="cb-label">Email</label>
                    <input type="email" id="reg-email" class="cb-input" placeholder="you@company.com" required>
                </div>
                <div>
                    <label class="cb-label">Password</label>
                    <input type="password" id="reg-password" class="cb-input" placeholder="Min 6 characters" required
                        minlength="6">
                </div>
                <div>
                    <label class="cb-label">Team</label>
                    <select id="reg-team" class="cb-select" required>
                        <option value="">Select your team...</option>
                        <option value="content">Content</option>
                        <option value="marketing">Marketing</option>
                        <option value="engineering">Engineering</option>
                        <option value="operations">Operations</option>
                    </select>
                </div>
                <div id="reg-error" class="hidden"
                    style="color: var(--cb-danger); font-size: 13px; padding: 8px; background: #FEE2E2; border-radius: 6px;">
                </div>
                <button type="submit" class="btn-success" id="reg-btn">Create Account</button>
            </form>
        </div>

        <p style="margin-top: 32px; font-size: 12px; color: var(--cb-text-muted); font-weight: 400;">
            Codebasics · Enabling Careers
        </p>
    </div>

    <script src="auth.js"></script>
    <script>
        // Redirect if already logged in
        redirectIfLoggedIn();

        function showTab(tab) {
            document.getElementById('login-form').classList.toggle('hidden', tab !== 'login');
            document.getElementById('register-form').classList.toggle('hidden', tab !== 'register');
            document.getElementById('forgot-form').classList.toggle('hidden', tab !== 'forgot');
            document.getElementById('tab-login').classList.toggle('active', tab === 'login');
            document.getElementById('tab-register').classList.toggle('active', tab === 'register');
        }

        // Forgot password link
        document.getElementById('forgot-link').addEventListener('click', (e) => {
            e.preventDefault();
            showTab('forgot');
        });

        document.getElementById('back-to-login').addEventListener('click', (e) => {
            e.preventDefault();
            showTab('login');
        });

        // Forgot password submit
        document.getElementById('forgot-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errorDiv = document.getElementById('forgot-error');
            const successDiv = document.getElementById('forgot-success');
            const btn = document.getElementById('forgot-btn');
            errorDiv.classList.add('hidden');
            successDiv.classList.add('hidden');
            btn.disabled = true;
            btn.textContent = 'SENDING...';

            const { error } = await sendPasswordReset(
                document.getElementById('forgot-email').value
            );

            if (error) {
                errorDiv.textContent = error.message;
                errorDiv.classList.remove('hidden');
            } else {
                successDiv.textContent = '✅ Reset link sent! Check your email inbox.';
                successDiv.classList.remove('hidden');
            }
            btn.disabled = false;
            btn.textContent = 'Send Reset Link';
        });

        // Login
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errorDiv = document.getElementById('login-error');
            const btn = document.getElementById('login-btn');
            errorDiv.classList.add('hidden');
            btn.disabled = true;
            btn.textContent = 'SIGNING IN...';

            const { data, error } = await signIn(
                document.getElementById('login-email').value,
                document.getElementById('login-password').value
            );

            if (error) {
                errorDiv.textContent = error.message;
                errorDiv.classList.remove('hidden');
                btn.disabled = false;
                btn.textContent = 'SIGN IN';
            } else {
                const profile = await getProfile();
                if (profile && profile.team === 'operations') {
                    window.location.href = '/ops.html';
                } else {
                    window.location.href = '/booking.html';
                }
            }
        });

        // Register
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errorDiv = document.getElementById('reg-error');
            const btn = document.getElementById('reg-btn');
            errorDiv.classList.add('hidden');
            btn.disabled = true;
            btn.textContent = 'CREATING...';

            const { data, error } = await signUp(
                document.getElementById('reg-email').value,
                document.getElementById('reg-password').value,
                document.getElementById('reg-name').value,
                document.getElementById('reg-team').value
            );

            if (error) {
                errorDiv.textContent = error.message;
                errorDiv.classList.remove('hidden');
                btn.disabled = false;
                btn.textContent = 'CREATE ACCOUNT';
            } else {
                // Auto-login after signup
                const { error: loginErr } = await signIn(
                    document.getElementById('reg-email').value,
                    document.getElementById('reg-password').value
                );
                if (!loginErr) {
                    const profile = await getProfile();
                    if (profile && profile.team === 'operations') {
                        window.location.href = '/ops.html';
                    } else {
                        window.location.href = '/booking.html';
                    }
                } else {
                    showToast('Account created! Please sign in.', 'success');
                    showTab('login');
                    btn.disabled = false;
                    btn.textContent = 'CREATE ACCOUNT';
                }
            }
        });
    </script>
</body>

</html>
