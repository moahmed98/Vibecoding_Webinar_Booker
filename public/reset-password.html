<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — Codebasics</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
    <div class="auth-center">
        <div style="margin-bottom: 32px;">
            <img src="https://files.codebasics.io/v3/images/sticky-logo.svg" alt="Codebasics" style="height: 72px;">
        </div>

        <div class="card card-glow" style="max-width: 440px; width: 100%; padding: 44px;">
            <h2 style="font-size: 20px; font-weight: 800; margin-bottom: 8px;">Reset your password</h2>
            <p style="font-size: 14px; color: var(--cb-text-secondary); margin-bottom: 24px;">
                Enter a new password below.
            </p>

            <form id="reset-form" style="display: flex; flex-direction: column; gap: 16px;">
                <div>
                    <label class="cb-label">New Password</label>
                    <input type="password" id="new-password" class="cb-input" placeholder="Min 6 characters" required
                        minlength="6">
                </div>
                <div>
                    <label class="cb-label">Confirm Password</label>
                    <input type="password" id="confirm-password" class="cb-input" placeholder="Re-enter password"
                        required minlength="6">
                </div>
                <div id="reset-error" class="hidden"
                    style="color: var(--cb-danger); font-size: 13px; padding: 8px; background: #FEE2E2; border-radius: 6px;">
                </div>
                <div id="reset-success" class="hidden"
                    style="color: #059669; font-size: 13px; padding: 8px; background: #D1FAE5; border-radius: 6px;">
                </div>
                <button type="submit" class="btn-primary" id="reset-btn">Update Password</button>
            </form>
        </div>

        <p style="margin-top: 32px; font-size: 12px; color: var(--cb-text-muted); font-weight: 400;">
            Codebasics · Enabling Careers
        </p>
    </div>

    <script src="auth.js"></script>
    <script>
        document.getElementById('reset-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errorDiv = document.getElementById('reset-error');
            const successDiv = document.getElementById('reset-success');
            const btn = document.getElementById('reset-btn');
            const newPw = document.getElementById('new-password').value;
            const confirmPw = document.getElementById('confirm-password').value;

            errorDiv.classList.add('hidden');
            successDiv.classList.add('hidden');

            if (newPw !== confirmPw) {
                errorDiv.textContent = 'Passwords do not match.';
                errorDiv.classList.remove('hidden');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'UPDATING...';

            const { error } = await updatePassword(newPw);

            if (error) {
                errorDiv.textContent = error.message;
                errorDiv.classList.remove('hidden');
            } else {
                successDiv.textContent = '✅ Password updated! Redirecting to login...';
                successDiv.classList.remove('hidden');
                document.getElementById('reset-form').style.display = 'none';
                setTimeout(() => { window.location.href = '/'; }, 2000);
            }
            btn.disabled = false;
            btn.textContent = 'Update Password';
        });
    </script>
</body>

</html>
